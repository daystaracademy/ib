<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Own Visitor Information</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background: #f7f9fc; }
        .box { max-width: 650px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tip { color: #d93025; font-weight: bold; margin-bottom: 15px; }
        .item { line-height: 1.8; color: #333; word-break: break-all; }
        .label { display: inline-block; width: 160px; color: #555; font-weight: 500; }
        hr { margin: 18px 0; border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div class="box">
    <div class="tip">⚠️ NOTICE: All information below is YOUR OWN visitor data being displayed on this website</div>
    <h3>Your Complete Visitor Details</h3>
    <div id="info" class="item">Loading your personal access data...</div>
</div>

<script>
fetch('https://ipapi.co/json/')
.then(res => res.json())
.then(ipData => {
    const ua = navigator.userAgent;
    const platform = navigator.platform;
    const language = navigator.language;
    const cookieEnabled = navigator.cookieEnabled;
    const online = navigator.onLine;
    const cpuCores = navigator.hardwareConcurrency || "Unknown";
    const deviceMemory = navigator.deviceMemory || "Unknown";

    const scrW = screen.width;
    const scrH = screen.height;
    const scrD = screen.colorDepth;

    let deviceType = "Desktop Device";
    if (/mobile|android|iphone|ipod/i.test(ua)) deviceType = "Mobile Phone";
    else if (/ipad|tablet/i.test(ua)) deviceType = "Tablet Device";

    let browser = "Unknown Browser";
    if (/edg/i.test(ua)) browser = "Microsoft Edge";
    else if (/chrome/i.test(ua)) browser = "Google Chrome";
    else if (/firefox/i.test(ua)) browser = "Mozilla Firefox";
    else if (/safari/i.test(ua)) browser = "Apple Safari";

    let os = "Unknown System";
    if (/win/i.test(ua)) os = "Windows System";
    else if (/mac/i.test(ua)) os = "macOS System";
    else if (/android/i.test(ua)) os = "Android System";
    else if (/iphone|ios/i.test(ua)) os = "iOS System";
    else if (/linux/i.test(ua)) os = "Linux System";

    const html = `
<span class="label">Your Public IP Address:</span>${ipData.ip}<br>
<span class="label">IP Usage Type:</span>${ipData.type || "General Residential IP"}<br>
<span class="label">Country:</span>${ipData.country_name} (${ipData.country_code})<br>
<span class="label">Region / State:</span>${ipData.region}<br>
<span class="label">City Location:</span>${ipData.city}<br>
<span class="label">Postal Code:</span>${ipData.postal || "Not Available"}<br>
<span class="label">Geographic Coordinates:</span>${ipData.latitude}, ${ipData.longitude}<br>
<span class="label">Local Time Zone:</span>${ipData.timezone}<br>
<span class="label">UTC Time Offset:</span>${ipData.utc_offset}<br>
<span class="label">Inside EU Region:</span>${ipData.in_eu ? "Yes" : "No"}<br>
<span class="label">Network ISP Provider:</span>${ipData.isp}<br>
<span class="label">Network Organization:</span>${ipData.org}<br>
<span class="label">Network ASN Code:</span>${ipData.asn}<br>
<span class="label">Local Currency:</span>${ipData.currency_name} (${ipData.currency})<br>
<span class="label">Common Local Languages:</span>${ipData.languages}<br>
<hr>
<span class="label">Your Device Type:</span>${deviceType}<br>
<span class="label">Operating System:</span>${os} (${platform})<br>
<span class="label">Current Browser:</span>${browser}<br>
<span class="label">System Default Language:</span>${language}<br>
<span class="label">Screen Resolution:</span>${scrW} × ${scrH}<br>
<span class="label">Screen Color Depth:</span>${scrD} bit<br>
<span class="label">CPU Logical Cores:</span>${cpuCores}<br>
<span class="label">Device RAM Size:</span>${deviceMemory} GB<br>
<span class="label">Cookies Function Enabled:</span>${cookieEnabled ? "Enabled" : "Disabled"}<br>
<span class="label">Current Network Status:</span>${online ? "Online Connected" : "Offline Disconnected"}<br>
<span class="label">Complete User-Agent String:</span><br><small>${ua}</small>
    `;
    document.getElementById('info').innerHTML = html;
})
.catch(() => {
    document.getElementById('info').innerText = "Failed to load your personal visitor data, blocked by privacy settings or network rules.";
});
</script>
</body>
</html>
